<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – GlucoBreath AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-card { width: 100%; max-width: 450px; }
    </style>
</head>
<body>
    <div class="register-card glass-container">
        <h2 style="margin-bottom: 5px;">Join the Future.</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Create your GlucoBreath account today.</p>

        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label>Choose Username</label>
                <input type="text" name="username" placeholder="Pick a unique username" required>
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <input type="password" name="password" placeholder="Min. 8 characters" required>
            </div>
            <button class="btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <p style="margin-top: 25px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            Already a member? <a href="{{ url_for('login') }}" style="color: var(--accent); text-decoration: none; font-weight: 700;">Log in here</a>
        </p>
    </div>
</body>
</html>
