<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlucoBreath – Smart Glucose Prediction Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 650px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .result-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            min-height: 250px;
        }

        .result-value {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
            margin-bottom: 5px;
            display: none;
        }

        .result-unit {
            font-size: 1.2rem;
            color: var(--text-muted);
            display: none;
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: none;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-pill-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        footer {
            margin-top: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="status-pill">
                <div class="status-pill-dot"></div>
                AI SENSOR ACTIVE
            </div>
            <h1>GlucoBreath AI</h1>
            <p class="subtitle">Simulated Non-Invasive Glucose Prediction System</p>
        </header>

        <div class="dashboard-grid">
            <div class="input-section">
                <div class="input-group">
                    <label>💨 Breath Acetone (ppm)</label>
                    <input type="number" id="acetone" placeholder="e.g. 150.5" step="0.1" value="120">
                </div>
                <div class="input-group">
                    <label>🌡️ Breath Temperature (°C)</label>
                    <input type="number" id="temperature" placeholder="e.g. 32.5" step="0.1" value="31.2">
                </div>
                <div class="input-group">
                    <label>💧 Breath Humidity (%)</label>
                    <input type="number" id="humidity" placeholder="e.g. 65" step="1" value="62">
                </div>
                <button id="predictBtn">ANALYZE BREATH</button>
            </div>

            <div class="result-section" id="resultCard">
                <div class="loader" id="loader"></div>
                <div class="placeholder-text" id="placeholder">Enter sensor values to begin prediction.</div>
                <div class="result-value" id="resultValue">--</div>
                <div class="result-unit" id="resultUnit">mg/dL</div>
            </div>
        </div>
    </div>

    <footer>
        <span>📡 IoT Simulation Mode</span>
        <span>🧠 Random Forest v1.0.4</span>
    </footer>

    <script>
        document.getElementById('predictBtn').addEventListener('click', async () => {
            const acetone = document.getElementById('acetone').value;
            const temperature = document.getElementById('temperature').value;
            const humidity = document.getElementById('humidity').value;

            // UI Feedback
            const loader = document.getElementById('loader');
            const placeholder = document.getElementById('placeholder');
            const resultValue = document.getElementById('resultValue');
            const resultUnit = document.getElementById('resultUnit');
            const btn = document.getElementById('predictBtn');

            // Reset UI
            placeholder.style.display = 'none';
            resultValue.style.display = 'none';
            resultUnit.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;
            btn.textContent = 'ANALYZING...';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acetone, temperature, humidity })
                });

                const data = await response.json();

                if (data.success) {
                    // Simulate processing delay for effect
                    setTimeout(() => {
                        loader.style.display = 'none';
                        resultValue.style.display = 'block';
                        resultUnit.style.display = 'block';
                        resultValue.textContent = data.prediction;
                        btn.disabled = false;
                        btn.textContent = 'ANALYZE BREATH';
                        
                        // Add some color coding
                        if (data.prediction > 180) resultValue.style.color = '#ef4444'; // High
                        else if (data.prediction < 70) resultValue.style.color = '#3b82f6'; // Low
                        else resultValue.style.color = '#22d3ee'; // Normal
                    }, 800);
                } else {
                    alert('Error: ' + data.error);
                    loader.style.display = 'none';
                    placeholder.style.display = 'block';
                    placeholder.textContent = "AI Model hasn't been trained yet! Run model_train.py first.";
                    btn.disabled = false;
                    btn.textContent = 'ANALYZE BREATH';
                }
            } catch (error) {
                console.error(error);
                alert('API Server is not running. Start app.py first!');
                loader.style.display = 'none';
                placeholder.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ANALYZE BREATH';
            }
        });
    </script>
</body>
</html>
