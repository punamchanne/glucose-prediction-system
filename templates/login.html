<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – GlucoBreath AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { width: 100%; max-width: 450px; }
    </style>
</head>
<body>
    <div class="login-card glass-container">
        <h2 style="margin-bottom: 10px;">Welcome Back!</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Log in to access your dashboard.</p>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button class="btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <p style="margin-top: 25px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent); text-decoration: none; font-weight: 700;">Sign up free</a>
        </p>
    </div>
</body>
</html>
